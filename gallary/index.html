<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Story | Yunomi Handroll</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="/" class="logo-link">
        <img src="https://yunomihandroll.com/wp-content/uploads/2022/05/yunomi-natural-logo-opt-1.png" alt="Yunomi Handroll Logo" class="brand-logo">
      </a>
      <div class="nav-links">
        <a href="/menu">Menus</a>
        <a href="/gallery" style="color: var(--accent);">Gallery</a>
        <a href="/press">Press</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </div>
    </div>
  </header>

  <main>
    <div class="section-title">
      <p>Behind the Counter</p>
      <h1>The Gallery</h1>
    </div>

    <div class="image-grid">
      <div class="image-container">
        <img src="/images/handroll-1.jpg" alt="Premium Blue Crab Handroll passing over counter">
        <div class="image-caption">Crisp Nori Execution</div>
      </div>

      <div class="image-container">
        <img src="/images/interior-dtla.jpg" alt="Sleek architecture of DTLA Arts District counter layout">
        <div class="image-caption">DTLA Counter Space</div>
      </div>

      <div class="image-container">
        <img src="/images/handroll-2.jpg" alt="Torched Yellowtail Cut Roll setup">
        <div class="image-caption">Warm Rice Prep Precision</div>
      </div>

      <div class="image-container">
        <img src="/images/interior-culver.jpg" alt="Award-winning concrete and timber bar lines at Culver Steps">
        <div class="image-caption">The Culver Steps Design Lines</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-logo">
        <p>YUNOMI.</p>
        <span>© 2026 Yunomi Handroll. All Rights Reserved.</span>
      </div>
      <div class="footer-socials">
        <a href="https://www.instagram.com/yunomihandroll" target="_blank">Instagram</a>
      </div>
      <div class="footer-contact-link">
        <a href="/contact">Corporate Contact →</a>
      </div>
    </div>
  </footer>

</body>
</html>
