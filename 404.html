<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Yunomi Handroll</title>
  <link rel="icon" type="image/png" href="https://yunomihandroll.com/wp-content/uploads/2022/05/yunomi-natural-logo-opt-1.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    .error-container {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 20px;
    }
    .error-code {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 24px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #FFFFFF;
      margin-bottom: 24px;
    }
    .error-message {
      max-width: 450px;
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .error-btn {
      padding: 16px 32px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-decoration: none;
      background-color: var(--accent);
      color: #111111;
      transition: background-color 0.2s ease, color 0.2s ease;
    }
    .error-btn:hover {
      background-color: var(--accent-hover);
    }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="/" class="logo-link">
        <img src="https://yunomihandroll.com/wp-content/uploads/2022/05/yunomi-natural-logo-opt-1.png" alt="Yunomi Handroll Logo" class="brand-logo">
      </a>
      <div class="nav-links">
        <a href="/menu">Menus</a>
        <a href="/press">Press</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="https://yunomihandroll.com/apply-now/" target="_blank" class="cta-btn">Hiring</a>
      </div>
    </div>
  </header>

  <main class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Roll Not Found</h1>
    <p class="error-message">The counter configuration or path you are looking for does not exist. It may have been moved, deleted, or eaten.</p>
    <a href="/" class="error-btn">Return to Safety</a>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-logo">
        <p>YUNOMI.</p>
        <span>© 2026 Yunomi Handroll. All Rights Reserved.</span>
      </div>
      <div class="footer-socials">
        <a href="https://www.instagram.com/yunomihandroll" target="_blank">Instagram</a>
        <a href="https://www.facebook.com/yunomihandroll" target="_blank">Facebook</a>
      </div>
    </div>
  </footer>

</body>
</html>
